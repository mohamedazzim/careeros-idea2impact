services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: careeros-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - careeros-net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: careeros-redis
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - careeros-net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Qdrant Vector Store
  qdrant:
    image: qdrant/qdrant:v1.18.1
    container_name: careeros-qdrant
    ports:
      - "127.0.0.1:6333:6333"  # Bind to localhost only; do not expose publicly
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - careeros-net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: careeros-backend
    ports:
      - "127.0.0.1:8000:8000"  # Bind to localhost only
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_HOST: ${REDIS_HOST:-redis}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_PRIMARY_MODEL: ${GEMINI_PRIMARY_MODEL:-gemini-2.5-flash}
      GEMINI_REASONING_MODEL: ${GEMINI_REASONING_MODEL:-gemini-2.5-flash}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      THEIRSTACK_API_KEY: ${THEIRSTACK_API_KEY}
      THEIRSTACK_API_KEY_1: ${THEIRSTACK_API_KEY_1}
      THEIRSTACK_API_KEY_2: ${THEIRSTACK_API_KEY_2}
      THEIRSTACK_API_KEY_3: ${THEIRSTACK_API_KEY_3}
      THEIRSTACK_API_KEY_4: ${THEIRSTACK_API_KEY_4}
      THEIRSTACK_API_KEY_5: ${THEIRSTACK_API_KEY_5}
      THEIRSTACK_API_KEY_6: ${THEIRSTACK_API_KEY_6}
      THEIRSTACK_API_KEY_7: ${THEIRSTACK_API_KEY_7}
      THEIRSTACK_API_KEY_8: ${THEIRSTACK_API_KEY_8}
      THEIRSTACK_API_KEY_9: ${THEIRSTACK_API_KEY_9}
      THEIRSTACK_API_URL_1: ${THEIRSTACK_API_URL_1}
      THEIRSTACK_API_URL_2: ${THEIRSTACK_API_URL_2}
      THEIRSTACK_API_URL_3: ${THEIRSTACK_API_URL_3}
      THEIRSTACK_API_URL_4: ${THEIRSTACK_API_URL_4}
      THEIRSTACK_API_URL_5: ${THEIRSTACK_API_URL_5}
      THEIRSTACK_API_URL_6: ${THEIRSTACK_API_URL_6}
      THEIRSTACK_API_URL_7: ${THEIRSTACK_API_URL_7}
      THEIRSTACK_API_URL_8: ${THEIRSTACK_API_URL_8}
      THEIRSTACK_API_URL_9: ${THEIRSTACK_API_URL_9}
      THEIRSTACK_MAX_RESULTS_PER_REQUEST: ${THEIRSTACK_MAX_RESULTS_PER_REQUEST:-5}
      THEIRSTACK_RESULTS_PER_QUERY: ${THEIRSTACK_RESULTS_PER_QUERY:-5}
      THEIRSTACK_JOB_FETCH_LIMIT: ${THEIRSTACK_JOB_FETCH_LIMIT:-5}
      THEIRSTACK_MAX_QUERIES_PER_REFRESH: ${THEIRSTACK_MAX_QUERIES_PER_REFRESH:-5}
      JOB_AUTO_REFRESH_ENABLED: ${JOB_AUTO_REFRESH_ENABLED:-false}
      JOB_AUTO_REFRESH_INTERVAL_MINUTES: ${JOB_AUTO_REFRESH_INTERVAL_MINUTES:-30}
      JOB_AUTO_REFRESH_EMBED_BATCH_SIZE: ${JOB_AUTO_REFRESH_EMBED_BATCH_SIZE:-50}
      MAKE_RAG_WEBHOOK_URL: ${MAKE_RAG_WEBHOOK_URL}
      MAKE_RAG_API_KEY: ${MAKE_RAG_API_KEY}
      QDRANT_RAG_DOCS_COLLECTION: ${QDRANT_RAG_DOCS_COLLECTION:-careeros_rag_docs}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-nvidia/nv-embed-v1}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-gemini-2.5-flash}
      RAG_USE_MAKE: ${RAG_USE_MAKE:-false}
      CALL_ALERT_DRY_RUN: ${CALL_ALERT_DRY_RUN:-true}
      OUTBOUND_CALL_DRY_RUN: ${OUTBOUND_CALL_DRY_RUN:-true}
      PIPEDREAM_WEBHOOK_URL: ${PIPEDREAM_WEBHOOK_URL:-}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_BASE_PATH: ${STORAGE_BASE_PATH:-/tmp/careeros_storage}
      SEED_DEMO_EMAIL: ${SEED_DEMO_EMAIL:-}
      SEED_DEMO_PASSWORD: ${SEED_DEMO_PASSWORD:-}
      SEED_DEMO_NAME: ${SEED_DEMO_NAME:-CareerOS Demo User}
      SEED_DEMO_ROLE: ${SEED_DEMO_ROLE:-User}
    volumes:
      - ./docs:/app/docs:ro
      - backend_storage:/tmp/careeros_storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - careeros-net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Background Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: careeros-worker
    command: python -m src.workers.arq_worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_HOST: ${REDIS_HOST:-redis}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_PRIMARY_MODEL: ${GEMINI_PRIMARY_MODEL:-gemini-2.5-flash}
      GEMINI_REASONING_MODEL: ${GEMINI_REASONING_MODEL:-gemini-2.5-flash}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
      THEIRSTACK_API_KEY: ${THEIRSTACK_API_KEY}
      THEIRSTACK_API_KEY_1: ${THEIRSTACK_API_KEY_1}
      THEIRSTACK_API_KEY_2: ${THEIRSTACK_API_KEY_2}
      THEIRSTACK_API_KEY_3: ${THEIRSTACK_API_KEY_3}
      THEIRSTACK_API_KEY_4: ${THEIRSTACK_API_KEY_4}
      THEIRSTACK_API_KEY_5: ${THEIRSTACK_API_KEY_5}
      THEIRSTACK_API_KEY_6: ${THEIRSTACK_API_KEY_6}
      THEIRSTACK_API_KEY_7: ${THEIRSTACK_API_KEY_7}
      THEIRSTACK_API_KEY_8: ${THEIRSTACK_API_KEY_8}
      THEIRSTACK_API_KEY_9: ${THEIRSTACK_API_KEY_9}
      THEIRSTACK_API_URL_1: ${THEIRSTACK_API_URL_1}
      THEIRSTACK_API_URL_2: ${THEIRSTACK_API_URL_2}
      THEIRSTACK_API_URL_3: ${THEIRSTACK_API_URL_3}
      THEIRSTACK_API_URL_4: ${THEIRSTACK_API_URL_4}
      THEIRSTACK_API_URL_5: ${THEIRSTACK_API_URL_5}
      THEIRSTACK_API_URL_6: ${THEIRSTACK_API_URL_6}
      THEIRSTACK_API_URL_7: ${THEIRSTACK_API_URL_7}
      THEIRSTACK_API_URL_8: ${THEIRSTACK_API_URL_8}
      THEIRSTACK_API_URL_9: ${THEIRSTACK_API_URL_9}
      THEIRSTACK_MAX_RESULTS_PER_REQUEST: ${THEIRSTACK_MAX_RESULTS_PER_REQUEST:-5}
      THEIRSTACK_RESULTS_PER_QUERY: ${THEIRSTACK_RESULTS_PER_QUERY:-5}
      THEIRSTACK_JOB_FETCH_LIMIT: ${THEIRSTACK_JOB_FETCH_LIMIT:-5}
      THEIRSTACK_MAX_QUERIES_PER_REFRESH: ${THEIRSTACK_MAX_QUERIES_PER_REFRESH:-5}
      JOB_AUTO_REFRESH_ENABLED: ${JOB_AUTO_REFRESH_ENABLED:-false}
      JOB_AUTO_REFRESH_INTERVAL_MINUTES: ${JOB_AUTO_REFRESH_INTERVAL_MINUTES:-30}
      JOB_AUTO_REFRESH_EMBED_BATCH_SIZE: ${JOB_AUTO_REFRESH_EMBED_BATCH_SIZE:-50}
      WORKER_MAX_JOBS: ${WORKER_MAX_JOBS}
      WORKER_JOB_TIMEOUT: ${WORKER_JOB_TIMEOUT}
      MAKE_RAG_WEBHOOK_URL: ${MAKE_RAG_WEBHOOK_URL}
      MAKE_RAG_API_KEY: ${MAKE_RAG_API_KEY}
      QDRANT_RAG_DOCS_COLLECTION: ${QDRANT_RAG_DOCS_COLLECTION:-careeros_rag_docs}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-nvidia/nv-embed-v1}
      RAG_LLM_MODEL: ${RAG_LLM_MODEL:-gemini-2.5-flash}
      RAG_USE_MAKE: ${RAG_USE_MAKE:-false}
      CALL_ALERT_DRY_RUN: ${CALL_ALERT_DRY_RUN:-true}
      OUTBOUND_CALL_DRY_RUN: ${OUTBOUND_CALL_DRY_RUN:-true}
      PIPEDREAM_WEBHOOK_URL: ${PIPEDREAM_WEBHOOK_URL:-}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_BASE_PATH: ${STORAGE_BASE_PATH:-/tmp/careeros_storage}
    volumes:
      - ./docs:/app/docs:ro
      - backend_storage:/tmp/careeros_storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.Redis(host='redis',port=6379); r.ping()"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - careeros-net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/api/v1/realtime}
    container_name: careeros-frontend
    ports:
      - "127.0.0.1:3000:3000"  # Bind to localhost only
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - careeros-net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: careeros-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-careeros.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - careeros-net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  backend_storage:
    driver: local

networks:
  careeros-net:
    driver: bridge
