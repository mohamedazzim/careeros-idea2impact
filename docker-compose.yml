services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careeros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careeros}
      POSTGRES_DB: ${POSTGRES_DB:-careeros_db}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careeros} -d ${POSTGRES_DB:-careeros_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careeros-backend-1
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-careeros}:${POSTGRES_PASSWORD:-careeros}@db:5432/${POSTGRES_DB:-careeros_db}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-dev_secret_change_in_production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_PRIMARY_MODEL=${GEMINI_PRIMARY_MODEL:-gemini-2.5-flash}
      - GEMINI_REASONING_MODEL=${GEMINI_REASONING_MODEL:-gemini-2.5-flash}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - TWILIO_TEST_PHONE_NUMBER=${TWILIO_TEST_PHONE_NUMBER:-}
      - CALL_ALERT_DRY_RUN=${CALL_ALERT_DRY_RUN:-true}
      - OUTBOUND_CALL_DRY_RUN=${OUTBOUND_CALL_DRY_RUN:-true}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_CONVAI_AGENT_ID=${ELEVENLABS_CONVAI_AGENT_ID:-${ELEVENLABS_AGENT_ID:-}}
      - ELEVENLABS_CONVAI_PHONE_NUMBER_ID=${ELEVENLABS_CONVAI_PHONE_NUMBER_ID:-${ELEVENLABS_AGENT_PHONE_NUMBER_ID:-${ELEVENLABS_PHONE_NUMBER_ID:-}}}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-careeros}
      - THEIRSTACK_API_KEY=${THEIRSTACK_API_KEY:-}
      - THEIRSTACK_API_KEY_1=${THEIRSTACK_API_KEY_1:-}
      - THEIRSTACK_API_KEY_2=${THEIRSTACK_API_KEY_2:-}
      - THEIRSTACK_API_KEY_3=${THEIRSTACK_API_KEY_3:-}
      - THEIRSTACK_API_KEY_4=${THEIRSTACK_API_KEY_4:-}
      - THEIRSTACK_API_KEY_5=${THEIRSTACK_API_KEY_5:-}
      - THEIRSTACK_API_KEY_6=${THEIRSTACK_API_KEY_6:-}
      - THEIRSTACK_API_KEY_7=${THEIRSTACK_API_KEY_7:-}
      - THEIRSTACK_API_KEY_8=${THEIRSTACK_API_KEY_8:-}
      - THEIRSTACK_API_KEY_9=${THEIRSTACK_API_KEY_9:-}
      - THEIRSTACK_API_KEY_10=${THEIRSTACK_API_KEY_10:-}
      - THEIRSTACK_API_KEY_11=${THEIRSTACK_API_KEY_11:-}
      - THEIRSTACK_API_KEY_12=${THEIRSTACK_API_KEY_12:-}
      - THEIRSTACK_API_KEY_13=${THEIRSTACK_API_KEY_13:-}
      - THEIRSTACK_API_KEY_14=${THEIRSTACK_API_KEY_14:-}
      - THEIRSTACK_API_KEY_15=${THEIRSTACK_API_KEY_15:-}
      - THEIRSTACK_API_URL_10=${THEIRSTACK_API_URL_10:-}
      - THEIRSTACK_API_URL_11=${THEIRSTACK_API_URL_11:-}
      - THEIRSTACK_API_URL_12=${THEIRSTACK_API_URL_12:-}
      - THEIRSTACK_API_URL_13=${THEIRSTACK_API_URL_13:-}
      - THEIRSTACK_API_URL_14=${THEIRSTACK_API_URL_14:-}
      - THEIRSTACK_API_URL_15=${THEIRSTACK_API_URL_15:-}
      - THEIRSTACK_MAX_RESULTS_PER_REQUEST=${THEIRSTACK_MAX_RESULTS_PER_REQUEST:-5}
      - THEIRSTACK_RESULTS_PER_QUERY=${THEIRSTACK_RESULTS_PER_QUERY:-5}
      - THEIRSTACK_JOB_FETCH_LIMIT=${THEIRSTACK_JOB_FETCH_LIMIT:-5}
      - THEIRSTACK_MAX_QUERIES_PER_REFRESH=${THEIRSTACK_MAX_QUERIES_PER_REFRESH:-5}
      - JOB_AUTO_REFRESH_ENABLED=${JOB_AUTO_REFRESH_ENABLED:-false}
      - JOB_AUTO_REFRESH_INTERVAL_MINUTES=${JOB_AUTO_REFRESH_INTERVAL_MINUTES:-30}
      - JOB_AUTO_REFRESH_EMBED_BATCH_SIZE=${JOB_AUTO_REFRESH_EMBED_BATCH_SIZE:-50}
      - PIPEDREAM_WEBHOOK_URL=${PIPEDREAM_WEBHOOK_URL:-}
      - MAKE_RAG_WEBHOOK_URL=${MAKE_RAG_WEBHOOK_URL:-}
      - MAKE_RAG_API_KEY=${MAKE_RAG_API_KEY:-}
      - QDRANT_RAG_DOCS_COLLECTION=${QDRANT_RAG_DOCS_COLLECTION:-careeros_rag_docs}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-nvidia/nv-embed-v1}
      - RAG_LLM_MODEL=${RAG_LLM_MODEL:-gemini-2.5-flash}
      - RAG_USE_MAKE=${RAG_USE_MAKE:-true}
    volumes:
      - ./docs:/app/docs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    container_name: careeros-backend-test
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-careeros}:${POSTGRES_PASSWORD:-careeros}@db:5432/${POSTGRES_DB:-careeros_db}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-dev_secret_change_in_production}
      - ENVIRONMENT=test
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_PRIMARY_MODEL=${GEMINI_PRIMARY_MODEL:-gemini-2.5-flash}
      - GEMINI_REASONING_MODEL=${GEMINI_REASONING_MODEL:-gemini-2.5-flash}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - LANGCHAIN_TRACING_V2=false
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-careeros}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    profiles:
      - test
    restart: "no"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careeros-worker-1
    command: python -m src.workers.arq_worker
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-careeros}:${POSTGRES_PASSWORD:-careeros}@db:5432/${POSTGRES_DB:-careeros_db}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-dev_secret_change_in_production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_PRIMARY_MODEL=${GEMINI_PRIMARY_MODEL:-gemini-2.5-flash}
      - GEMINI_REASONING_MODEL=${GEMINI_REASONING_MODEL:-gemini-2.5-flash}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - TWILIO_TEST_PHONE_NUMBER=${TWILIO_TEST_PHONE_NUMBER:-}
      - CALL_ALERT_DRY_RUN=${CALL_ALERT_DRY_RUN:-true}
      - OUTBOUND_CALL_DRY_RUN=${OUTBOUND_CALL_DRY_RUN:-true}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_CONVAI_AGENT_ID=${ELEVENLABS_CONVAI_AGENT_ID:-${ELEVENLABS_AGENT_ID:-}}
      - ELEVENLABS_CONVAI_PHONE_NUMBER_ID=${ELEVENLABS_CONVAI_PHONE_NUMBER_ID:-${ELEVENLABS_AGENT_PHONE_NUMBER_ID:-${ELEVENLABS_PHONE_NUMBER_ID:-}}}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-careeros}
      - THEIRSTACK_API_KEY=${THEIRSTACK_API_KEY:-}
      - THEIRSTACK_API_KEY_1=${THEIRSTACK_API_KEY_1:-}
      - THEIRSTACK_API_KEY_2=${THEIRSTACK_API_KEY_2:-}
      - THEIRSTACK_API_KEY_3=${THEIRSTACK_API_KEY_3:-}
      - THEIRSTACK_API_KEY_4=${THEIRSTACK_API_KEY_4:-}
      - THEIRSTACK_API_KEY_5=${THEIRSTACK_API_KEY_5:-}
      - THEIRSTACK_API_KEY_6=${THEIRSTACK_API_KEY_6:-}
      - THEIRSTACK_API_KEY_7=${THEIRSTACK_API_KEY_7:-}
      - THEIRSTACK_API_KEY_8=${THEIRSTACK_API_KEY_8:-}
      - THEIRSTACK_API_KEY_9=${THEIRSTACK_API_KEY_9:-}
      - WORKER_MAX_JOBS=${WORKER_MAX_JOBS:-10}
      - WORKER_JOB_TIMEOUT=${WORKER_JOB_TIMEOUT:-300}
      - THEIRSTACK_API_KEY_10=${THEIRSTACK_API_KEY_10:-}
      - THEIRSTACK_API_KEY_11=${THEIRSTACK_API_KEY_11:-}
      - THEIRSTACK_API_KEY_12=${THEIRSTACK_API_KEY_12:-}
      - THEIRSTACK_API_KEY_13=${THEIRSTACK_API_KEY_13:-}
      - THEIRSTACK_API_KEY_14=${THEIRSTACK_API_KEY_14:-}
      - THEIRSTACK_API_KEY_15=${THEIRSTACK_API_KEY_15:-}
      - THEIRSTACK_API_URL_10=${THEIRSTACK_API_URL_10:-}
      - THEIRSTACK_API_URL_11=${THEIRSTACK_API_URL_11:-}
      - THEIRSTACK_API_URL_12=${THEIRSTACK_API_URL_12:-}
      - THEIRSTACK_API_URL_13=${THEIRSTACK_API_URL_13:-}
      - THEIRSTACK_API_URL_14=${THEIRSTACK_API_URL_14:-}
      - THEIRSTACK_API_URL_15=${THEIRSTACK_API_URL_15:-}
      - THEIRSTACK_MAX_RESULTS_PER_REQUEST=${THEIRSTACK_MAX_RESULTS_PER_REQUEST:-5}
      - THEIRSTACK_RESULTS_PER_QUERY=${THEIRSTACK_RESULTS_PER_QUERY:-5}
      - THEIRSTACK_JOB_FETCH_LIMIT=${THEIRSTACK_JOB_FETCH_LIMIT:-5}
      - THEIRSTACK_MAX_QUERIES_PER_REFRESH=${THEIRSTACK_MAX_QUERIES_PER_REFRESH:-5}
      - JOB_AUTO_REFRESH_ENABLED=${JOB_AUTO_REFRESH_ENABLED:-false}
      - JOB_AUTO_REFRESH_INTERVAL_MINUTES=${JOB_AUTO_REFRESH_INTERVAL_MINUTES:-30}
      - JOB_AUTO_REFRESH_EMBED_BATCH_SIZE=${JOB_AUTO_REFRESH_EMBED_BATCH_SIZE:-50}
      - PIPEDREAM_WEBHOOK_URL=${PIPEDREAM_WEBHOOK_URL:-}
      - MAKE_RAG_WEBHOOK_URL=${MAKE_RAG_WEBHOOK_URL:-}
      - MAKE_RAG_API_KEY=${MAKE_RAG_API_KEY:-}
      - QDRANT_RAG_DOCS_COLLECTION=${QDRANT_RAG_DOCS_COLLECTION:-careeros_rag_docs}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-nvidia/nv-embed-v1}
      - RAG_LLM_MODEL=${RAG_LLM_MODEL:-gemini-2.5-flash}
      - RAG_USE_MAKE=${RAG_USE_MAKE:-true}
    volumes:
      - ./docs:/app/docs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.Redis(host='redis',port=6379); r.ping()"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careeros-frontend-1
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1/realtime
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
