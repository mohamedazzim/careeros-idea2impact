name: Security Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run TruffleHog (Secret Scan)
      uses: trufflesecurity/trufflehog@v3.67.0
      with:
        path: ./
        base: ""
        head: ${{ github.ref_name }}
        extra_args: --debug --only-verified
    - name: Backend Dependency Scan (Safety)
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        python -m pip install poetry==2.4.1 poetry-plugin-export safety
        poetry install --no-root 2>&1 || true
        VENV_PATH=$(poetry env info --path 2>/dev/null || echo "")
        if [ -n "$VENV_PATH" ] && [ -f "$VENV_PATH/bin/pip" ]; then
          "$VENV_PATH/bin/pip" install pytorch-revgrad==0.2.0 2>&1 || true
        fi
        poetry export -f requirements.txt --without-hashes -o requirements.txt
        safety check -r requirements.txt --policy-file ../.safety-policy.yml
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Frontend Dependency Audit
      run: |
        cd frontend
        npm install
        npm audit --audit-level=high
